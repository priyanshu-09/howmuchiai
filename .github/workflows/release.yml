name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            binary: howmuchiai
          - target: x86_64-apple-darwin
            os: macos-latest
            binary: howmuchiai
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            binary: howmuchiai
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            binary: howmuchiai
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            binary: howmuchiai.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package binary (Unix)
        if: matrix.os != 'windows-latest'
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          mkdir -p dist
          cp "target/${TARGET}/release/${BINARY}" dist/
          cd dist
          tar czf "howmuchiai-${TARGET}.tar.gz" "${BINARY}"

      - name: Package binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        env:
          TARGET: ${{ matrix.target }}
          BINARY: ${{ matrix.binary }}
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/$env:TARGET/release/$env:BINARY" -Destination dist/
          Compress-Archive -Path "dist/$env:BINARY" -DestinationPath "dist/howmuchiai-$env:TARGET.zip"

      - name: Upload artifact (Unix)
        if: matrix.os != 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: howmuchiai-${{ matrix.target }}
          path: dist/howmuchiai-${{ matrix.target }}.tar.gz

      - name: Upload artifact (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: howmuchiai-${{ matrix.target }}
          path: dist/howmuchiai-${{ matrix.target }}.zip

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
          generate_release_notes: true
